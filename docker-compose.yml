services:
  redis:
    image: redis:7
    restart: unless-stopped

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    restart: unless-stopped
    volumes:
      - ${HOME}/Desktop:/Users/petartopic/Desktop
      - ${HOME}/.config/opencode:/root/.config/opencode
    environment:
      OPENCODE_SESSION_STORE: redis
      REDIS_URL: redis://redis:6379
      OPENCODE_CONFIG_DIR: /root/.config/opencode
    ports:
      - "62771:62771"
    depends_on:
      - redis

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ${HOME}/Desktop:/Users/petartopic/Desktop
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OPENCODE_BASE_URL: http://opencode:62771
    depends_on:
      - opencode
