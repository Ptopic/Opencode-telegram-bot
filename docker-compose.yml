services:
  redis:
    image: redis:7
    restart: unless-stopped

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.opencode
    restart: unless-stopped
    volumes:
      - ${HOME}/Desktop:/Users/petartopic/Desktop
    environment:
      OPENCODE_SESSION_STORE: redis
      REDIS_URL: redis://redis:6379
    ports:
      - "4096:4096"
    depends_on:
      - redis

  telegram-bot:
    build:
      context: ./telegram-bot
    restart: unless-stopped
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OPENCODE_URL: http://opencode:4096
    depends_on:
      - opencode
